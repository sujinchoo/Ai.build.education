<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 서비스 개발 12주 커리큘럼</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css" />
<style>
:root {
  --bg: #f3f6fb;
  --card: #ffffff;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --text: #111827;
  --muted: #6b7280;
  --line: #e5e7eb;
  --sidebar: #0f172a;
  --sidebar-muted: #94a3b8;
  --sidebar-active: #1e293b;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}
.sidebar {
  width: 320px;
  background: var(--sidebar);
  color: white;
  padding: 24px 16px;
  border-right: 1px solid #0b1220;
  overflow-y: auto;
}
.sidebar h1 { font-size: 20px; margin: 0 0 6px; }
.sidebar p { margin: 0 0 18px; color: var(--sidebar-muted); font-size: 13px; line-height: 1.5; }
.lecture-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 8px; }
.lecture-btn {
  width: 100%; background: transparent; color: var(--sidebar-muted); border: 1px solid transparent;
  text-align: left; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 14px; line-height: 1.35;
}
.lecture-btn:hover, .lecture-btn.active { color: white; background: var(--sidebar-active); border-color: #334155; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar {
  padding: 18px 28px; border-bottom: 1px solid var(--line); background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(4px);
}
.progress { font-size: 14px; color: var(--muted); }
.content-wrap { flex: 1; overflow-y: auto; padding: 28px; }
.slide {
  max-width: 1080px; margin: 0 auto; background: var(--card); border: 1px solid var(--line);
  border-radius: 18px; box-shadow: 0 6px 22px rgba(15, 23, 42, 0.07); padding: 30px;
}
.slide h1, .slide h2, .slide h3 { margin-top: 18px; margin-bottom: 10px; }
.slide h1 { font-size: 30px; margin-top: 0; }
.slide h2 { font-size: 24px; }
.slide h3 { font-size: 20px; }
.slide p, .slide li { line-height: 1.7; }
.slide pre {
  background: #0b1220; color: #e2e8f0; padding: 14px; border-radius: 10px; overflow-x: auto;
}
.slide code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
.slide table { width: 100%; border-collapse: collapse; margin: 10px 0 16px; }
.slide th, .slide td { border: 1px solid var(--line); padding: 8px 10px; text-align: left; }
.slide blockquote {
  margin: 12px 0; border-left: 4px solid var(--primary); padding: 8px 12px; background: #eff6ff; color: #1e3a8a;
}
.doc-layout { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 24px; }
.toc-panel {
  position: sticky; top: 10px; align-self: start; border: 1px solid var(--line); border-radius: 12px;
  padding: 14px; background: #f8fafc;
}
.toc-panel h3 { margin: 0 0 10px; font-size: 16px; }
.toc-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 6px; }
.toc-list a { color: #334155; text-decoration: none; font-size: 14px; }
.toc-level-3 { padding-left: 10px; }
.callout { border-radius: 12px; padding: 12px 14px; margin: 10px 0; border: 1px solid; }
.callout-title { font-weight: 700; margin-bottom: 6px; font-size: 13px; letter-spacing: .02em; }
.callout-note { background: #eff6ff; border-color: #bfdbfe; color: #1e3a8a; }
.callout-tip { background: #ecfdf5; border-color: #86efac; color: #065f46; }
.callout-warning { background: #fffbeb; border-color: #fde68a; color: #92400e; }
.callout-important { background: #f5f3ff; border-color: #c4b5fd; color: #5b21b6; }
.status { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
.footer-nav {
  border-top: 1px solid var(--line); background: white; padding: 14px 28px; display: flex; justify-content: space-between; align-items: center;
}
.nav-btn {
  padding: 10px 18px; border-radius: 10px; border: 1px solid var(--line);
  background: white; color: var(--text); font-weight: 600; cursor: pointer;
}
.nav-btn.primary { background: var(--primary); color: white; border-color: var(--primary); }
.nav-btn.primary:hover { background: var(--primary-dark); }
.nav-btn:disabled { opacity: 0.45; cursor: not-allowed; }
@media (max-width: 1080px) {
  .doc-layout { grid-template-columns: 1fr; }
  .toc-panel { position: relative; top: auto; }
}
@media (max-width: 960px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; max-height: 300px; }
  .content-wrap { padding: 16px; }
  .slide { padding: 20px; }
}
</style>
</head>
<body>
<aside class="sidebar">
  <h1>AI 서비스 개발 12주</h1>
  <p>MD 원본은 유지하고, 빌드 시 HTML로 변환해 Mermaid/코드 하이라이트/목차/콜아웃 UI를 제공합니다.</p>
  <ul class="lecture-list" id="lectureList"></ul>
</aside>

<main class="main">
  <div class="topbar">
    <div class="progress" id="progressText">로딩 중...</div>
  </div>

  <div class="content-wrap">
    <article class="slide" id="slideContainer">
      <p>빌드된 강의 자료를 불러오는 중입니다...</p>
    </article>
  </div>

  <div class="footer-nav">
    <button id="prevBtn" class="nav-btn">이전 강의</button>
    <button id="nextBtn" class="nav-btn primary">다음</button>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

  const lectureList = document.getElementById("lectureList");
  const slideContainer = document.getElementById("slideContainer");
  const progressText = document.getElementById("progressText");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  const htmlCache = new Map();
  let lectures = [];
  let currentIndex = 0;

  mermaid.initialize({ startOnLoad: false, securityLevel: "loose" });

  async function loadManifest() {
    const response = await fetch("built/manifest.json", { cache: "no-store" });
    if (!response.ok) {
      throw new Error("빌드 산출물이 없습니다. 먼저 `python build_curriculum.py`를 실행하세요.");
    }
    const data = await response.json();
    lectures = data.lectures || [];
  }

  async function fetchLectureHtml(index) {
    if (htmlCache.has(index)) return htmlCache.get(index);
    const lecture = lectures[index];
    const response = await fetch(lecture.html, { cache: "no-store" });
    if (!response.ok) throw new Error(`파일 로드 실패: ${lecture.html}`);
    const html = await response.text();
    htmlCache.set(index, html);
    return html;
  }

  function renderLectureList() {
    lectureList.innerHTML = "";
    lectures.forEach((lecture, index) => {
      const li = document.createElement("li");
      const button = document.createElement("button");
      button.className = "lecture-btn";
      button.textContent = `${index + 1}. ${lecture.title}`;
      button.addEventListener("click", () => {
        currentIndex = index;
        render();
      });
      li.appendChild(button);
      lectureList.appendChild(li);
    });
  }

  async function enhanceUi() {
    if (window.hljs) {
      slideContainer.querySelectorAll("pre code").forEach((block) => hljs.highlightElement(block));
    }
    await mermaid.run({ querySelector: ".mermaid" });
  }

  async function render() {
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    progressText.textContent = `${currentIndex + 1} / ${lectures.length} 페이지 로딩 중...`;
    slideContainer.innerHTML = `<p class="status">강의 자료를 불러오는 중입니다...</p>`;

    try {
      const html = await fetchLectureHtml(currentIndex);
      slideContainer.innerHTML = html;
      await enhanceUi();
    } catch (error) {
      slideContainer.innerHTML = `
        <h2>강의 로딩 오류</h2>
        <p>${error.message}</p>
      `;
    }

    [...document.querySelectorAll(".lecture-btn")].forEach((btn, index) => {
      btn.classList.toggle("active", index === currentIndex);
    });

    progressText.textContent = `${currentIndex + 1} / ${lectures.length} 페이지`;
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === lectures.length - 1;
    nextBtn.textContent = currentIndex === lectures.length - 1 ? "마침" : (currentIndex === 0 ? "다음" : "다음 강의");
  }

  prevBtn.addEventListener("click", () => {
    if (currentIndex > 0) {
      currentIndex -= 1;
      render();
    }
  });

  nextBtn.addEventListener("click", () => {
    if (currentIndex < lectures.length - 1) {
      currentIndex += 1;
      render();
    }
  });

  (async function init() {
    try {
      await loadManifest();
      renderLectureList();
      render();
    } catch (error) {
      slideContainer.innerHTML = `<h2>초기화 실패</h2><p>${error.message}</p>`;
      progressText.textContent = "초기화 실패";
    }
  })();
</script>
</body>
</html>
