<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 서비스 개발 12주 커리큘럼</title>
<style>
:root {
    --bg: #f3f6fb;
    --card: #ffffff;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --text: #111827;
    --muted: #6b7280;
    --line: #e5e7eb;
    --sidebar: #0f172a;
    --sidebar-muted: #94a3b8;
    --sidebar-active: #1e293b;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
}

.sidebar {
    width: 320px;
    background: var(--sidebar);
    color: white;
    padding: 24px 16px;
    border-right: 1px solid #0b1220;
    overflow-y: auto;
}

.sidebar h1 {
    font-size: 20px;
    margin: 0 0 6px;
}

.sidebar p {
    margin: 0 0 18px;
    color: var(--sidebar-muted);
    font-size: 13px;
    line-height: 1.5;
}

.lecture-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 8px;
}

.lecture-btn {
    width: 100%;
    background: transparent;
    color: var(--sidebar-muted);
    border: 1px solid transparent;
    text-align: left;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.35;
}

.lecture-btn:hover,
.lecture-btn.active {
    color: white;
    background: var(--sidebar-active);
    border-color: #334155;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.topbar {
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.88);
    backdrop-filter: blur(4px);
}

.progress {
    font-size: 14px;
    color: var(--muted);
}

.content-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 28px;
}

.slide {
    max-width: 980px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 6px 22px rgba(15, 23, 42, 0.07);
    padding: 30px;
}

.badge {
    display: inline-block;
    background: #dbeafe;
    color: #1e3a8a;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
}

.slide h2 {
    margin: 0 0 10px;
    font-size: 28px;
}

.meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 18px;
}

.section {
    margin: 18px 0;
}

.section h3 {
    margin: 0 0 8px;
    font-size: 18px;
}

.section ul {
    margin: 0;
    padding-left: 22px;
    line-height: 1.7;
}

.footer-nav {
    border-top: 1px solid var(--line);
    background: white;
    padding: 14px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: white;
    color: var(--text);
    font-weight: 600;
    cursor: pointer;
}

.nav-btn.primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

.nav-btn.primary:hover { background: var(--primary-dark); }

.nav-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
}

@media (max-width: 960px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; max-height: 300px; }
    .content-wrap { padding: 16px; }
    .slide { padding: 20px; }
}
</style>
</head>
<body>
    <aside class="sidebar">
        <h1>AI 서비스 개발 12주</h1>
        <p>코세라 스타일 학습 화면 · 좌측 목차 클릭 시 자동 이동 · 중앙 슬라이드형 강의자료</p>
        <ul class="lecture-list" id="lectureList"></ul>
    </aside>

    <main class="main">
        <div class="topbar">
            <div class="progress" id="progressText">1 / 13 페이지</div>
        </div>

        <div class="content-wrap">
            <article class="slide" id="slideContainer"></article>
        </div>

        <div class="footer-nav">
            <button id="prevBtn" class="nav-btn">이전 강의</button>
            <button id="nextBtn" class="nav-btn primary">다음</button>
        </div>
    </main>

let currentIndex = 0;
const lectureList = document.getElementById("lectureList");
const slideContainer = document.getElementById("slideContainer");
const progressText = document.getElementById("progressText");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function renderLectureList() {
    lectureList.innerHTML = "";
    lectures.forEach((lecture, index) => {
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.className = "lecture-btn";
        button.textContent = `${index + 1}. ${lecture.title}`;
        button.addEventListener("click", () => {
            currentIndex = index;
            render();
        });
        li.appendChild(button);
        lectureList.appendChild(li);
    });
}

function render() {
    const lecture = lectures[currentIndex];
    const goals = lecture.goals.map(item => `<li>${item}</li>`).join("");
    const content = lecture.content.map(item => `<li>${item}</li>`).join("");

    slideContainer.innerHTML = `
        <div class="badge">${lecture.stage}</div>
        <h2>${lecture.title}</h2>
        <div class="meta">
            <span>⏱ ${lecture.duration}</span>
            <span>📌 강의 자료 페이지 형식</span>
        </div>

        <section class="section">
            <h3>비주얼 콘셉트</h3>
            <ul><li>${lecture.visual}</li></ul>
        </section>

        <section class="section">
            <h3>학습 목표</h3>
            <ul>${goals}</ul>
        </section>

        <section class="section">
            <h3>20분 강의 구성 콘텐츠</h3>
            <ul>${content}</ul>
        </section>

        <section class="section">
            <h3>실습 미션 (과제)</h3>
            <ul><li>${lecture.mission}</li></ul>
        </section>
    `;

    [...document.querySelectorAll(".lecture-btn")].forEach((btn, index) => {
        btn.classList.toggle("active", index === currentIndex);
    });

    progressText.textContent = `${currentIndex + 1} / ${lectures.length} 페이지`;

    prevBtn.disabled = currentIndex === 0;
    if (currentIndex === 0) {
        prevBtn.textContent = "이전 강의";
        nextBtn.textContent = "다음";
    } else {
        prevBtn.textContent = "이전 강의";
        nextBtn.textContent = currentIndex === lectures.length - 1 ? "마침" : "다음 강의";
    }

    nextBtn.disabled = currentIndex === lectures.length - 1;
}

prevBtn.addEventListener("click", () => {
    if (currentIndex > 0) {
        currentIndex -= 1;
        render();
    }
});

nextBtn.addEventListener("click", () => {
    if (currentIndex < lectures.length - 1) {
        currentIndex += 1;
        render();
    }
});

renderLectureList();
render();
</script>
